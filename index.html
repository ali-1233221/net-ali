<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Net-Ali</title>
<style>
body{margin:0;font-family:Arial;background:#111;color:#fff}
header{background:#1e1e1e;padding:20px;text-align:center}
nav{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding:15px}
button{padding:10px 16px;border:0;border-radius:8px;background:#00c8ff;cursor:pointer}
#cats{display:none;text-align:center}
.card{background:#222;margin:12px;padding:15px;border-radius:10px}
input{padding:10px;width:80%;max-width:400px;border-radius:8px;border:0}
</style>
<script>
function toggleCats(){
 let c=document.getElementById('cats');
 c.style.display=c.style.display==='block'?'none':'block';
}
</script>
</head>
<body>
<header><h1>🎮 Net-Ali</h1><p>موقع ألعاب</p></header>
<div style="text-align:center;padding:15px"><input placeholder="ابحث عن لعبة..."></div>
<nav>
<button onclick="toggleCats()">التصنيفات</button>
<button>أفضل 10 ألعاب</button>
<button>الألعاب الجديدة</button>
</nav>
<div id="cats">
<p>أكشن | سباقات | رياضة | رعب | أونلاين</p>
</div>
<div class="card"><h2>أفضل 10 ألعاب</h2><ol>
<li>Minecraft</li><li>GTA V</li><li>FiveM</li><li>EA FC 26</li><li>Valorant</li><li>Fortnite</li><li>CS2</li><li>PUBG</li><li>Rocket League</li><li>RDR2</li>
</ol></div>
<div class="card"><h2>الألعاب الجديدة</h2><p>أضف ألعابك هنا لاحقًا.</p></div>
</body></html>
