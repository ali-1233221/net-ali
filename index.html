<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نت علي</title>
<style>
body{
margin:0;
font-family:Arial;
background:#121212;
color:#fff;
}
header{
background:#1e1e1e;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}
a{
color:white;
text-decoration:none;
margin:10px;
cursor:pointer;
}
#about,#home{
padding:20px;
}
.games{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:15px;
}
.game{
background:#222;
padding:10px;
border-radius:10px;
text-align:center;
}
button{
background:#00b894;
border:none;
padding:8px 15px;
color:white;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<div>
<a onclick="showHome()">Home</a>
<a onclick="showAbout()">من نحن</a>
</div>
<h2>🎮 نت علي</h2>
</header>

<div id="home">
<h1>أفضل الألعاب</h1>

<div class="games">

<div class="game"><h3>Minecraft</h3><button>العب</button></div>
<div class="game"><h3>GTA V</h3><button>العب</button></div>
<div class="game"><h3>FiveM</h3><button>العب</button></div>
<div class="game"><h3>PUBG</h3><button>العب</button></div>
<div class="game"><h3>FC 26</h3><button>العب</button></div>
<div class="game"><h3>Roblox</h3><button>العب</button></div>
<div class="game"><h3>Valorant</h3><button>العب</button></div>
<div class="game"><h3>Need For Speed</h3><button>العب</button></div>

</div>

</div>

<div id="about" style="display:none">
<h1>من نحن</h1>
<p>
نحن مكونين من شخص واحد وهو المبرمج <b>علي</b>.
</p>
</div>

<script>
function showHome(){
document.getElementById("home").style.display="block";
document.getElementById("about").style.display="none";
}

function showAbout(){
document.getElementById("home").style.display="none";
document.getElementById("about").style.display="block";
}
</script>

</body>
</html>
